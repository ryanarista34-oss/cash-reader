<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Reader — Login Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background: #0a0e1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
  }
  .login-card {
    background: #0d1225;
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }
  .logo-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #00ff88;
    display: inline-block;
    animation: pulse 2s infinite;
    margin-right: 8px;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .title {
    color: #00ff88;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
  }
  .subtitle {
    color: #2a4a6f;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 30px;
  }
  .form-control {
    background: #080d1a;
    border: 1px solid #1e3a5f;
    color: #e0e8ff;
    border-radius: 8px;
    padding: 12px;
  }
  .form-control:focus {
    background: #080d1a;
    border-color: #00ff88;
    color: #e0e8ff;
    box-shadow: 0 0 0 2px rgba(0,255,136,0.15);
  }
  .form-label {
    color: #4a6fa5;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .btn-login {
    background: #00ff88;
    color: #080d1a;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-weight: bold;
    letter-spacing: 2px;
    width: 100%;
    font-size: 13px;
    margin-top: 10px;
  }
  .btn-login:hover { background: #00cc6a; color: #080d1a; }
  .error-msg {
    background: #1a0a0a;
    border: 1px solid #A32D2D;
    color: #F09595;
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    margin-bottom: 16px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div><span class="logo-dot"></span><span class="title">CASH READER</span></div>
    <div class="subtitle mt-1">IOT MONITORING SYSTEM</div>
  </div>

  {% if error %}
  <div class="error-msg">Username atau password salah!</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="mb-3">
      <label class="form-label">USERNAME</label>
      <input type="text" name="username" class="form-control" 
             placeholder="admin" required>
    </div>
    <div class="mb-3">
      <label class="form-label">PASSWORD</label>
      <input type="password" name="password" class="form-control" 
             placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-login">LOGIN →</button>
  </form>

  <div class="text-center mt-3" style="color: #2a4a6f; font-size: 10px; letter-spacing: 1px;">
    Raspberry Pi 4 — YOLO11s NCNN — IDR/MYR/SGD
  </div>
</div>
</body>
</html>
